<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: #10b981;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: white;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: white;
    }
    .header-text p {
      font-size: 11px;
      color: #64748b;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle-label {
      font-size: 13px;
      color: #cbd5e1;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #334155;
      border-radius: 22px;
      transition: 0.2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: #10b981;
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .input-group {
      margin-bottom: 8px;
    }
    .input-group label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 7px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #10b981;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: white;
    }
    .stat-value.synced { color: #10b981; }
    .stat-value.queued { color: #f59e0b; }
    .stat-value.failed { color: #ef4444; }
    .stat-label {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }

    .last-sync {
      text-align: center;
      font-size: 10px;
      color: #475569;
      margin-top: 8px;
    }

    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 6px;
    }
    .btn-primary {
      background: #10b981;
      color: white;
    }
    .btn-primary:hover { background: #059669; }
    .btn-secondary {
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
    }
    .btn-secondary:hover { background: #334155; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .status.connected {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
    }
    .status.disconnected {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status.connected .status-dot { background: #10b981; }
    .status.disconnected .status-dot { background: #ef4444; }

    .footer {
      padding: 12px 16px;
      text-align: center;
    }
    .footer a {
      color: #10b981;
      text-decoration: none;
      font-size: 11px;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">FP</div>
    <div class="header-text">
      <h1>Fresh Path CRM</h1>
      <p>Google Voice Auto-Sync</p>
    </div>
  </div>

  <div class="section">
    <div id="connectionStatus" class="status disconnected">
      <div class="status-dot"></div>
      <span>Checking connection...</span>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Enable sync</span>
      <label class="toggle">
        <input type="checkbox" id="enabledToggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sync Stats</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value synced" id="statSynced">0</div>
        <div class="stat-label">Synced</div>
      </div>
      <div class="stat-card">
        <div class="stat-value queued" id="statQueued">0</div>
        <div class="stat-label">Queued</div>
      </div>
      <div class="stat-card">
        <div class="stat-value failed" id="statFailed">0</div>
        <div class="stat-label">Failed</div>
      </div>
    </div>
    <div class="last-sync" id="lastSync">Never synced</div>
  </div>

  <div class="section">
    <div class="section-title">Configuration</div>
    <div class="input-group">
      <label>CRM URL</label>
      <input type="url" id="crmUrl" placeholder="http://localhost:3000" />
    </div>
    <div class="input-group">
      <label>API Key (optional)</label>
      <input type="password" id="apiKey" placeholder="Leave blank for local dev" />
    </div>
    <button class="btn btn-primary" id="testBtn">Test Connection</button>
    <button class="btn btn-secondary" id="saveBtn">Save Settings</button>
  </div>

  <div class="section">
    <button class="btn btn-secondary" id="flushBtn">Flush Queue Now</button>
    <button class="btn btn-secondary" id="scanBtn">Force Scan Page</button>
  </div>

  <div class="footer">
    <a id="openCrm" href="#">Open CRM Dashboard &rarr;</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
